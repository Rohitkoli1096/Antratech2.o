<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Prize Wheel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
height:100vh;
background:radial-gradient(circle at top,#1b2735,#090a0f);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
overflow:hidden;
}

/* ===== BACKGROUND GLOW ===== */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#7b2ff7,#14c1d7,transparent);
filter:blur(120px);
opacity:.25;
animation:floatGlow 10s infinite alternate;
}

@keyframes floatGlow{
0%{transform:translate(-20px,-20px)}
100%{transform:translate(40px,40px)}
}

/* ===== HEADER ===== */

.container{
text-align:center;
margin-bottom:25px;
}

h1{
font-size:2.7em;
font-weight:800;
background:linear-gradient(90deg,#14c1d7,#7b2ff7);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{opacity:.7;margin-top:5px}

.xp-display{
margin-top:15px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
padding:10px 22px;
border-radius:30px;
backdrop-filter:blur(10px);
}

/* ===== WHEEL ===== */

.wheel-wrapper{
position:relative;
width:460px;
height:460px;
margin:20px auto;
}

.pointer{
position:absolute;
top:-28px;
left:50%;
transform:translateX(-50%);
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:38px solid #14c1d7;
z-index:10;
filter:drop-shadow(0 5px 10px rgba(0,0,0,.6));
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:14px solid rgba(255,255,255,0.2);
position:relative;
overflow:hidden;
transition:transform 5s cubic-bezier(.25,.46,.45,.94);
box-shadow:0 0 60px rgba(123,47,247,.4), inset 0 0 20px rgba(255,255,255,.1);
background:#111;
}

/* CENTER HUB */

.center-circle{
position:absolute;
width:130px;
height:130px;
background:linear-gradient(135deg,#14c1d7,#7b2ff7);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:5;
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
letter-spacing:1px;
box-shadow:0 0 30px rgba(123,47,247,.7);
cursor:pointer;
transition:.3s;
}

.center-circle:hover{
transform:translate(-50%,-50%) scale(1.1);
box-shadow:0 0 50px rgba(123,47,247,1);
}

/* SEGMENTS */

.segment{
position:absolute;
width:50%;
height:50%;
top:50%;
left:50%;
transform-origin:0% 0%;
clip-path:polygon(0 0,100% 0,0 100%);
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:25px;
font-size:14px;
font-weight:700;
color:#fff;
text-shadow:0 2px 6px rgba(0,0,0,.8);
}

/* ===== SPIN BUTTON ===== */

button{
margin-top:25px;
padding:15px 55px;
border:none;
border-radius:50px;
font-weight:700;
font-size:18px;
background:linear-gradient(90deg,#14c1d7,#7b2ff7);
color:#fff;
cursor:pointer;
box-shadow:0 0 25px rgba(123,47,247,.6);
transition:.3s;
}

button:hover:not(:disabled){
transform:translateY(-3px);
box-shadow:0 0 40px rgba(123,47,247,1);
}

button:disabled{opacity:.4}

/* ===== RESULT POPUP ===== */

.result{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.7);
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
padding:45px 60px;
border-radius:25px;
text-align:center;
display:none;
box-shadow:0 0 60px rgba(20,193,215,.6);
}

.result.show{
display:block;
animation:pop .4s ease forwards;
}

@keyframes pop{
to{transform:translate(-50%,-50%) scale(1)}
}

.result h2{
font-size:2.3em;
margin-bottom:12px;
background:linear-gradient(90deg,#14c1d7,#7b2ff7);
-webkit-background-clip:text;
color:transparent;
}

.result .xp-gained{
margin-top:10px;
font-size:1.3em;
color:#14c1d7;
font-weight:700;
}

.close-btn{
margin-top:20px;
padding:10px 28px;
background:#14c1d7;
border:none;
border-radius:25px;
color:#fff;
font-weight:700;
cursor:pointer;
}

</style>
</head>
<body>

<div class="container">
<h1>🎡 Fun Activity Wheel</h1>
<p class="subtitle">Spin & earn rewards for your learning journey</p>
<div class="xp-display">Total XP: <span id="xpCount">0</span></div>
</div>

<div class="wheel-wrapper">
<div class="pointer"></div>
<div class="wheel" id="wheel">
<div class="center-circle" onclick="spin()">SPIN</div>
</div>
</div>

<button id="spinBtn" onclick="spin()">🎯 Spin the Wheel</button>

<div class="result" id="result">
<h2 id="resultTitle"></h2>
<p id="resultText"></p>
<div class="xp-gained" id="xpGained"></div>
<button class="close-btn" onclick="closeResult()">Close</button>
</div>

<script>
const wheel=document.getElementById("wheel");
const spinBtn=document.getElementById("spinBtn");
const resultDiv=document.getElementById("result");
const resultTitle=document.getElementById("resultTitle");
const xpDisplay=document.getElementById("xpCount");

let totalXP=0;

const prizes=[
{label:"🎁 $500",xp:50,win:true},
{label:"💎 VIP",xp:70,win:true},
{label:"🎁 $100",xp:25,win:true},
{label:"🏆 GRAND",xp:200,win:true},
{label:"🎁 $250",xp:40,win:true},
{label:"⭐ 50% OFF",xp:60,win:true},
{label:"🎁 $1000",xp:100,win:true},
{label:"🎫 Free Ticket",xp:55,win:true},
{label:"🎁 $750",xp:80,win:true},
{label:"💝 Bonus",xp:70,win:true},
{label:"🎁 $2000",xp:120,win:true},
{label:"🌟 Gift",xp:90,win:true},
{label:"😢 Try Again",xp:10,win:false},
{label:"😢 Try Again",xp:10,win:false}
];

const colors=["#7b2ff7","#14c1d7","#ff6b6b","#6bcB77","#ff9a00","#4ECDC4","#A66CFF","#FFD93D","#00c9a7","#ff6f91","#f9f871","#2ec4b6","#d00000","#9d4edd"];

const segmentAngle=360/prizes.length;

prizes.forEach((prize,index)=>{
let segment=document.createElement("div");
segment.className="segment";
segment.style.background=colors[index];
segment.style.transform=`rotate(${segmentAngle*index}deg) skewY(${90-segmentAngle}deg)`;
segment.innerHTML=`<div style="transform:skewY(-${90-segmentAngle}deg) rotate(${segmentAngle/2}deg)">${prize.label}</div>`;
wheel.appendChild(segment);
});

let isSpinning=false;
let currentRotation=0;

function spin(){
if(isSpinning)return;
isSpinning=true;
spinBtn.disabled=true;

let randomIndex=Math.floor(Math.random()*prizes.length);
let stopAngle=360-(randomIndex*segmentAngle)-(segmentAngle/2);
let spins=360*8;

currentRotation+=spins+stopAngle;
wheel.style.transform=`rotate(${currentRotation}deg)`;

setTimeout(()=>{
showResult(prizes[randomIndex]);
isSpinning=false;
spinBtn.disabled=false;
},5000);
}

function showResult(prize){
totalXP+=prize.xp;
xpDisplay.textContent=totalXP;

resultTitle.textContent=prize.win?"🎉 You Won!":"😢 Better Luck!";
document.getElementById("resultText").textContent=prize.label;
document.getElementById("xpGained").textContent=`+${prize.xp} XP (Total ${totalXP})`;

resultDiv.classList.add("show");
}

function closeResult(){
resultDiv.classList.remove("show");
}
</script>

</body>
</html>
